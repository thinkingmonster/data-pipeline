apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: data-pipeline
  labels:
    app: minio
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app: minio
---
# Headless service required by the StatefulSet for stable pod DNS.
apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: data-pipeline
  labels:
    app: minio
spec:
  clusterIP: None
  ports:
    - name: api
      port: 9000
      targetPort: 9000
  selector:
    app: minio
