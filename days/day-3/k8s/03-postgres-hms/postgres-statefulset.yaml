apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hms-postgres
  namespace: data-pipeline
  labels:
    app: hms-postgres
spec:
  serviceName: hms-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: hms-postgres
  template:
    metadata:
      labels:
        app: hms-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16.4
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: hms-postgres-credentials
          env:
            # postgres:16 image writes PGDATA into /var/lib/postgresql/data by default.
            # Putting it under a subdir of the mount avoids the "lost+found" directory
            # that some storage provisioners create at the mount root.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
