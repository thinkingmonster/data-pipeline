apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-metastore-site
  namespace: data-pipeline
  labels:
    app: hive-metastore
data:
  # hive-site.xml — sole source of config for both the schematool init Job
  # and the Hive Metastore runtime Deployment. Mounted at /opt/hive/conf/hive-site.xml.
  #
  # Deliberately credential-free. S3A creds come from env vars
  # (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) via EnvironmentVariableCredentialsProvider.
  # Postgres creds come from env (javax.jdo.option.Connection{UserName,Password})
  # overridden via HIVE_CUSTOM_CONF_DIR pattern — we inline user/password here
  # because hive-site.xml does not interpolate env vars, and for the lab the
  # credentials are public (see postgres-secret.yaml).
  hive-site.xml: |
    <?xml version="1.0"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>

      <!-- ================================================================== -->
      <!-- Catalog backend: PostgreSQL via JDBC                                -->
      <!-- HMS stores table→path mappings, partition lists, column stats here. -->
      <!-- ================================================================== -->
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:postgresql://hms-postgres:5432/metastore</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>hive</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>hive</value>
      </property>

      <!-- Don't let HMS try to auto-create the schema. We run schematool
           explicitly as a one-shot Job so the contract is visible. -->
      <property>
        <name>datanucleus.schema.autoCreateAll</name>
        <value>false</value>
      </property>
      <property>
        <name>hive.metastore.schema.verification</name>
        <value>true</value>
      </property>

      <!-- ================================================================== -->
      <!-- Warehouse location: MinIO (S3-compatible)                           -->
      <!-- Everything created via `CREATE TABLE ... LOCATION` goes through     -->
      <!-- s3a:// — HMS stores only the path, the data lives in MinIO.         -->
      <!-- ================================================================== -->
      <property>
        <name>metastore.warehouse.dir</name>
        <value>s3a://analytics-lab/warehouse</value>
      </property>
      <property>
        <name>hive.metastore.warehouse.dir</name>
        <value>s3a://analytics-lab/warehouse</value>
      </property>

      <!-- ================================================================== -->
      <!-- S3A filesystem — point at MinIO, not AWS                            -->
      <!-- ================================================================== -->
      <property>
        <name>fs.s3a.endpoint</name>
        <value>http://minio:9000</value>
      </property>
      <property>
        <name>fs.s3a.path.style.access</name>
        <value>true</value>
      </property>
      <property>
        <name>fs.s3a.connection.ssl.enabled</name>
        <value>false</value>
      </property>
      <property>
        <name>fs.s3a.aws.credentials.provider</name>
        <value>org.apache.hadoop.fs.s3a.auth.EnvironmentVariableCredentialsProvider</value>
      </property>

      <!-- ================================================================== -->
      <!-- Thrift service listener                                             -->
      <!-- Clients (Spark, StarRocks) connect here to resolve tables.          -->
      <!-- ================================================================== -->
      <property>
        <name>metastore.thrift.uris</name>
        <value>thrift://hive-metastore:9083</value>
      </property>
      <property>
        <name>metastore.thrift.port</name>
        <value>9083</value>
      </property>

      <!-- Metastore runs in "remote" mode — it's a standalone server, not
           embedded in a Hive CLI. Spark/StarRocks act as pure clients. -->
      <property>
        <name>metastore.task.threads.always</name>
        <value>org.apache.hadoop.hive.metastore.events.EventCleanerTask</value>
      </property>
      <property>
        <name>metastore.expression.proxy</name>
        <value>org.apache.hadoop.hive.metastore.DefaultPartitionExpressionProxy</value>
      </property>

    </configuration>
