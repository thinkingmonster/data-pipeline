apiVersion: v1
kind: Secret
metadata:
  name: s3a-credentials
  namespace: data-pipeline
type: Opaque
stringData:
  # Lab-only credentials. Same values as minio-credentials, but exposed under
  # AWS-style env var names so Hadoop's EnvironmentVariableCredentialsProvider
  # picks them up transparently. This mirrors the prod pattern where IRSA (on
  # EKS) or instance profiles inject AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
  # into pods — hive-site.xml stays credential-free.
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
