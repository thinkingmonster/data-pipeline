apiVersion: v1
kind: Namespace
metadata:
  name: data-pipeline
  labels:
    lab: "13"
    purpose: analytics-pipeline-lab
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: data-pipeline-quota
  namespace: data-pipeline
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 48Gi
    limits.cpu: "32"
    limits.memory: 96Gi
    persistentvolumeclaims: "40"
---
# A ResourceQuota that caps requests+limits *forces* every pod to declare them
# (otherwise admission rejects with "must specify limits.cpu for: ..."). A
# LimitRange supplies sensible defaults so ad-hoc pods (kubectl run, Jobs
# without explicit resources) still admit. Authored manifests can — and should
# — set their own resources; the LimitRange is a backstop.
apiVersion: v1
kind: LimitRange
metadata:
  name: data-pipeline-defaults
  namespace: data-pipeline
spec:
  limits:
    - type: Container
      default:                 # used as `limits` if container omits them
        cpu: "500m"
        memory: 512Mi
      defaultRequest:          # used as `requests` if container omits them
        cpu: "100m"
        memory: 128Mi
      max:                     # ceiling per container — keep one runaway pod from eating the quota
        cpu: "8"
        memory: 16Gi
