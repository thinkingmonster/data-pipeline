apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-gap
  namespace: data-pipeline
  labels:
    app: mock-gap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-gap
  template:
    metadata:
      labels:
        app: mock-gap
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: mock-gap
          image: mock-gap:day2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: data-pipeline-kafka-bootstrap:9092
            - name: SCHEMA_REGISTRY_URL
              value: http://schema-registry:8081
            - name: LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-gap
  namespace: data-pipeline
  labels:
    app: mock-gap
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app: mock-gap
